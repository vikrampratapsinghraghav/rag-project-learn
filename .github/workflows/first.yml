name: build and deploy

on:
  push: 
    branches: [ main ]


jobs: 
  install: 
    runs-on: ubuntu-latest
    defaults: 
      run: 
        working-directory: frontend
        steps:
          - name: checkout code
            uses: actions/checkout@v4

  build:
    runs-on: ubuntu-lates
    needs: install
    defaults: 
      run: 
        working-directory: frontend
      steps: 
        - name: checkout code 
          uses: actions/checkout@v4

        - name: setup node
          uses: actions/setup-node@v4
          with:
            node-version: 22

        - name: install dependencies
          run: npm ci

        - name: build
          run: npm run build
         
          


      
      